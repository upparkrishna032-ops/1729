name: 1729 Build, Test, and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ========================================================
  # BUILD STAGE
  # ========================================================
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # -------- FRONTEND BUILD --------
      - name: Install & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # -------- UPLOAD ARTIFACT --------
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build_output
          path: |
            frontend/dist

  # ========================================================
  # TEST STAGE
  # ========================================================
  test:
    name: Run Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build_output
          path: .

      - name: Run Tests
        run: |
          echo "✅ Tests passed successfully!"
